  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --app-bg-light: #fafafa;
      --app-bg-dark: #0A0C10;

      /* Premium Dark Theme Variables */
      --dark-bg-primary: #0A0C10;
      --dark-bg-secondary: #111827;
      --dark-bg-tertiary: #1F2937;
      --dark-border-primary: #1F2937;
      --dark-border-secondary: #374151;
      --dark-text-primary: #F9FAFB;
      --dark-text-secondary: #9CA3AF;
      --dark-text-tertiary: #6B7280;
      --dark-accent-green: #00D4AA;
      --dark-accent-red: #ef4444;
      --dark-accent-blue: #3B82F6;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: opacity;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 4px 16px -4px rgba(0, 0, 0, 0.08);
      transform: translate3d(0, 0, 0);
    }

    .dark .glass-panel {
      background: #1a1d26;
      border: 1px solid #2d3342;
      box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.2);
    }

    .market-card-container {
      content-visibility: auto;
      contain-intrinsic-size: 150px;
    }

    /* Native-feel active states */
    .active-scale {
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .active-scale:active {
      transform: scale(0.95);
    }

    /* Hardware acceleration for charts */
    .recharts-responsive-container {
      will-change: transform;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .safe-pb {
      padding-bottom: env(safe-area-inset-bottom);
    }

    .safe-pt {
      padding-top: env(safe-area-inset-top);
    }
    /* Live pulsing dot at end of chart lines */
    @keyframes liveDotPulse {
      0% {
        transform: scale(1);
        opacity: 0.6;
      }
      70% {
        transform: scale(2.2);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 0;
      }
    }
    .live-dot-glow {
      animation: liveDotPulse 1.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      transform-origin: center;
      transform-box: fill-box;
    }
  </style>
